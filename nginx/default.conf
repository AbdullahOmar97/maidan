server {
    listen 80;
    server_name maidanjo.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name maidanjo.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/maidanjo.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maidanjo.duckdns.org/privkey.pem;

    location /static/ {
        alias /var/www/static/;
    }

    location /api/ {
        proxy_pass http://backend:8000;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
    }

    location / {
        proxy_pass http://frontend:3000;
    }
}
