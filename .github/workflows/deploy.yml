name: Deploy MAIDAN to EC2 Production

# متى يعمل هذا البايبلاين؟ عند عمل Push أو دمج (Merge) على فرع main
on:
  push:
    branches: [ "main" ]

# هذه الصلاحيات ضرورية للسماح لـ GitHub بطلب مفتاح OIDC المؤقت
permissions:
  id-token: write
  contents: read
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::182399710468:role/GitHubActions-MAIDAN-Deploy
          aws-region: eu-north-1

      - name: Trigger Deployment and Fetch Logs
        run: |
          # 1. Send the command and save the Command ID
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-0ad4417b87ab6dfa4" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["bash /home/ubuntu/maidan/deploy.sh"]' \
            --comment "Deploy via GitHub Actions" \
            --query "Command.CommandId" \
            --output text)
            
          echo "Command sent successfully. ID: $COMMAND_ID"
          echo "Waiting for the server to finish execution..."

          # 2. Custom wait loop (will not give up until the server finishes)
          STATUS="InProgress"
          while [ "$STATUS" == "InProgress" ] || [ "$STATUS" == "Pending" ] || [ "$STATUS" == "Delayed" ]; do
            sleep 15  # Wait 15 seconds between each check
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-0ad4417b87ab6dfa4" \
              --query "Status" \
              --output text)
            echo "Current status: $STATUS..."
          done

          # 3. Fetch and print outputs
          echo "======================================"
          echo "✅ Script output (Logs):"
          echo "======================================"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-0ad4417b87ab6dfa4" \
            --query "StandardOutputContent" \
            --output text

          echo "======================================"
          echo "❌ Errors:"
          echo "======================================"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-0ad4417b87ab6dfa4" \
            --query "StandardErrorContent" \
            --output text

          # 4. Declare final result to GitHub
          if [ "$STATUS" != "Success" ]; then
            echo "⚠️ Deployment failed inside the server! Check the errors."
            exit 1
          else
            echo "🎉 Deployment completed successfully!"
          fi
