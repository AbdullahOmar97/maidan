# =============================================================================
# MAIDAN Dojo Management System — Docker Compose (Production)
# =============================================================================
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
  
  # ---------------------------------------------------------------------------
  # Redis (Cache + Celery Broker)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Django Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: always
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SENTRY_ENVIRONMENT: production
      POSTGRES_HOST: db
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class gevent --timeout 120 --access-logfile - --error-logfile -
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: always
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SENTRY_ENVIRONMENT: production
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=warning --concurrency=4 -Q default,billing,messaging
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # Celery Beat (Scheduler)
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: always
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SENTRY_ENVIRONMENT: production
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat --loglevel=warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
  
  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        AUTH_URL: ${AUTH_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        NEXT_PUBLIC_PLATFORM_DOMAIN: ${NEXT_PUBLIC_PLATFORM_DOMAIN}
    restart: always
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    restart: always
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
  # ---------------------------------------------------------------------------
  # Certbot (Wildcard SSL Certificates via DuckDNS)
  # ---------------------------------------------------------------------------
  certbot:
    image: infinityofspace/certbot_dns_duckdns:latest
    restart: always
    volumes:
      - certbot_conf:/etc/letsencrypt
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-admin@maidanjo.duckdns.org}
    entrypoint: /bin/sh -c "certbot certonly --non-interactive --agree-tos --email $$LETSENCRYPT_EMAIL --authenticator dns-duckdns --dns-duckdns-token $$DUCKDNS_TOKEN --dns-duckdns-propagation-seconds 120 -d maidanjo.duckdns.org -d '*.maidanjo.duckdns.org' --expand --keep-until-expiring && trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;"

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  minio_data:
  certbot_conf:
  certbot_www:

